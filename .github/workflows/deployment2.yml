name: Deployment Exercise 2
on: push
jobs:
  lint: 
    runs-on: ubuntu-slim
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
  test:
    runs-on: ubuntu-slim
    needs: lint
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Install dependencies  
        run: npm ci
      - name: Test code
        run: npm test
  deploy:
    runs-on: ubuntu-slim
    needs: test
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Install dependencies  
        run: npm ci
      - name: Build code
        run: npm run build
      - name: Deploy code
        run: echo "Deploying code..."
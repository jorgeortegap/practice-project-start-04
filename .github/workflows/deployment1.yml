name: Deployment Exercise 1
on: push
jobs:
    deploy:
        runs-on: ubuntu-slim
        steps:
            - name: Get code
              uses: actions/checkout@v7
            - name: Install dependencies
              run: npm ci
            - name: Lint
              run: npm run lint
            - name: Test code
              run: npm test
            - name: Build code
              run: npm run build
            - name: Deploy code
              run: echo "Deploying code..."